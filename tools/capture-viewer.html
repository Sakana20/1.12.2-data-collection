<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NebulaeStats Capture Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f3;
      --panel: #ffffff;
      --ink: #202425;
      --muted: #687174;
      --line: #d9ded6;
      --accent: #0f8f7f;
      --accent-2: #c94d42;
      --accent-3: #3867b7;
      --shadow: 0 10px 28px rgba(36, 42, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    input[type="file"] {
      width: 260px;
      max-width: 100%;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      border-color: var(--accent);
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 18px 24px 28px;
    }

    .status {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 12px 14px;
      min-height: 76px;
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric strong {
      display: block;
      font-size: 21px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 1.45fr) minmax(320px, 0.95fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 0.72;
      min-height: 380px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #eef2ed;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .key {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--accent);
    }

    .swatch.region {
      background: rgba(201, 77, 66, 0.25);
      border: 1px solid var(--accent-2);
    }

    .swatch.start {
      background: var(--accent-3);
    }

    .chart-grid {
      display: grid;
      gap: 16px;
    }

    .chart {
      width: 100%;
      height: 190px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 1000px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(130px, 1fr));
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      header,
      main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .canvas-wrap {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>NebulaeStats Capture Viewer</h1>
    <div class="controls">
      <input id="fileInput" type="file" accept="application/json,.json">
      <button id="fitButton" type="button">适配视图</button>
    </div>
  </header>

  <main>
    <p id="status" class="status">请选择 `run/captures/2026-07-08_14-13-41.json`，或用本地服务器打开 `tools/capture-viewer.html?file=../run/captures/2026-07-08_14-13-41.json`。</p>

    <section id="metrics" class="metrics"></section>

    <section class="layout">
      <article class="panel">
        <h2>X/Z 轨迹与出口区域</h2>
        <div class="canvas-wrap">
          <canvas id="mapCanvas"></canvas>
        </div>
        <div class="legend">
          <span class="key"><span class="swatch"></span>移动轨迹</span>
          <span class="key"><span class="swatch start"></span>起点/终点</span>
          <span class="key"><span class="swatch region"></span>出口区域</span>
          <span>滚轮缩放，拖拽平移</span>
        </div>
      </article>

      <div class="chart-grid">
        <article class="panel">
          <h2>速度 / 时间</h2>
          <canvas id="speedChart" class="chart"></canvas>
        </article>
        <article class="panel">
          <h2>高度 Y / 时间</h2>
          <canvas id="heightChart" class="chart"></canvas>
        </article>
        <article class="panel">
          <h2>累计距离 / 时间</h2>
          <canvas id="distanceChart" class="chart"></canvas>
        </article>
        <article class="panel">
          <h2>出口区域</h2>
          <div id="regions"></div>
        </article>
      </div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fitButton = document.getElementById("fitButton");
    const statusEl = document.getElementById("status");
    const metricsEl = document.getElementById("metrics");
    const regionsEl = document.getElementById("regions");
    const mapCanvas = document.getElementById("mapCanvas");
    const speedChart = document.getElementById("speedChart");
    const heightChart = document.getElementById("heightChart");
    const distanceChart = document.getElementById("distanceChart");

    let capture = null;
    let view = { scale: 1, offsetX: 0, offsetY: 0 };
    let bounds = null;
    let dragging = false;
    let lastPointer = null;

    function formatNumber(value, digits = 2) {
      if (!Number.isFinite(value)) return "-";
      return value.toLocaleString("zh-CN", {
        maximumFractionDigits: digits,
        minimumFractionDigits: digits
      });
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * ratio));
      const height = Math.max(1, Math.floor(rect.height * ratio));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return { width: rect.width, height: rect.height, ratio };
    }

    function loadCapture(data, name = "capture") {
      if (!data || !Array.isArray(data.samples) || data.samples.length === 0) {
        throw new Error("JSON 中没有 samples 数据。");
      }
      capture = data;
      statusEl.textContent = `${name} | ${data.meta?.minecraftVersion || "-"} | ${data.samples.length} samples`;
      bounds = computeBounds(data);
      fitView();
      renderAll();
    }

    function computeBounds(data) {
      const xs = data.samples.map((sample) => sample.position.x);
      const zs = data.samples.map((sample) => sample.position.z);
      for (const region of data.exitRegions || []) {
        xs.push(region.min.x, region.max.x);
        zs.push(region.min.z, region.max.z);
      }
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minZ: Math.min(...zs),
        maxZ: Math.max(...zs)
      };
    }

    function fitView() {
      if (!capture || !bounds) return;
      const { width, height } = resizeCanvas(mapCanvas);
      const pad = 42;
      const worldW = Math.max(1, bounds.maxX - bounds.minX);
      const worldH = Math.max(1, bounds.maxZ - bounds.minZ);
      const scale = Math.min((width - pad * 2) / worldW, (height - pad * 2) / worldH);
      view.scale = Math.max(2, scale);
      view.offsetX = pad - bounds.minX * view.scale + ((width - pad * 2) - worldW * view.scale) / 2;
      view.offsetY = pad + bounds.maxZ * view.scale + ((height - pad * 2) - worldH * view.scale) / 2;
      renderMap();
    }

    function worldToScreen(x, z) {
      return {
        x: x * view.scale + view.offsetX,
        y: -z * view.scale + view.offsetY
      };
    }

    function screenToWorld(x, y) {
      return {
        x: (x - view.offsetX) / view.scale,
        z: -(y - view.offsetY) / view.scale
      };
    }

    function renderAll() {
      renderMetrics();
      renderMap();
      renderChart(speedChart, makeSpeedSeries(), "m/s", "#0f8f7f");
      renderChart(heightChart, capture.samples.map((sample) => ({
        x: sample.timeSeconds,
        y: sample.position.y
      })), "Y", "#3867b7");
      renderChart(distanceChart, capture.samples.map((sample) => ({
        x: sample.timeSeconds,
        y: sample.odometer?.distance3d ?? sample.odometer?.distance2d ?? 0
      })), "m", "#c94d42");
      renderRegions();
    }

    function renderMetrics() {
      const summary = capture.summary || {};
      const samples = capture.samples;
      const first = samples[0];
      const last = samples[samples.length - 1];
      const maxSpeed = Math.max(...makeSpeedSeries().map((point) => point.y));
      const yValues = samples.map((sample) => sample.position.y);
      const items = [
        ["样本数", samples.length.toString()],
        ["时长", `${formatNumber(summary.durationSeconds ?? last.timeSeconds)} s`],
        ["2D 距离", `${formatNumber(summary.totalDistance2d)} m`],
        ["3D 距离", `${formatNumber(summary.totalDistance3d)} m`],
        ["最高速度", `${formatNumber(maxSpeed)} m/s`],
        ["Y 范围", `${formatNumber(Math.min(...yValues), 1)} - ${formatNumber(Math.max(...yValues), 1)}`],
        ["起点", `X ${formatNumber(first.position.x, 1)}, Z ${formatNumber(first.position.z, 1)}`],
        ["终点", `X ${formatNumber(last.position.x, 1)}, Z ${formatNumber(last.position.z, 1)}`],
        ["出口区域", `${(capture.exitRegions || []).length} 个`],
        ["玩家", capture.meta?.playerName || "-"],
        ["采样率", capture.meta?.sampleRate || "-"],
        ["Mod", `${capture.meta?.modId || "-"} ${capture.meta?.modVersion || ""}`.trim()]
      ];
      metricsEl.innerHTML = items.map(([label, value]) => (
        `<div class="metric"><small>${escapeHtml(label)}</small><strong>${escapeHtml(value)}</strong></div>`
      )).join("");
    }

    function makeSpeedSeries() {
      const samples = capture.samples;
      return samples.map((sample, index) => {
        if (index === 0) return { x: sample.timeSeconds, y: 0 };
        const prev = samples[index - 1];
        const dt = Math.max(0.001, sample.timeSeconds - prev.timeSeconds);
        const distance = sample.delta?.distance3d ?? sample.delta?.distance2d ?? 0;
        return { x: sample.timeSeconds, y: distance / dt };
      });
    }

    function renderMap() {
      if (!capture) return;
      const size = resizeCanvas(mapCanvas);
      const ctx = mapCanvas.getContext("2d");
      ctx.clearRect(0, 0, size.width, size.height);
      drawGrid(ctx, size);
      drawRegions(ctx);
      drawPath(ctx);
    }

    function drawGrid(ctx, size) {
      const topLeft = screenToWorld(0, 0);
      const bottomRight = screenToWorld(size.width, size.height);
      const step = chooseGridStep(view.scale);
      ctx.save();
      ctx.strokeStyle = "#dfe5dc";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#7a8385";
      ctx.font = "11px Segoe UI, sans-serif";
      for (let x = Math.floor(topLeft.x / step) * step; x <= bottomRight.x; x += step) {
        const p = worldToScreen(x, 0);
        ctx.beginPath();
        ctx.moveTo(p.x, 0);
        ctx.lineTo(p.x, size.height);
        ctx.stroke();
        ctx.fillText(String(Math.round(x)), p.x + 4, 14);
      }
      for (let z = Math.floor(bottomRight.z / step) * step; z <= topLeft.z; z += step) {
        const p = worldToScreen(0, z);
        ctx.beginPath();
        ctx.moveTo(0, p.y);
        ctx.lineTo(size.width, p.y);
        ctx.stroke();
        ctx.fillText(String(Math.round(z)), 6, p.y - 4);
      }
      ctx.restore();
    }

    function chooseGridStep(scale) {
      const target = 70 / scale;
      const steps = [1, 2, 5, 10, 20, 50, 100, 200];
      return steps.find((step) => step >= target) || 500;
    }

    function drawRegions(ctx) {
      ctx.save();
      for (const region of capture.exitRegions || []) {
        const a = worldToScreen(region.min.x, region.min.z);
        const b = worldToScreen(region.max.x + 1, region.max.z + 1);
        const x = Math.min(a.x, b.x);
        const y = Math.min(a.y, b.y);
        const w = Math.abs(b.x - a.x);
        const h = Math.abs(b.y - a.y);
        ctx.fillStyle = "rgba(201, 77, 66, 0.22)";
        ctx.strokeStyle = "#c94d42";
        ctx.lineWidth = 2;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "#8f2d26";
        ctx.font = "12px Segoe UI, sans-serif";
        ctx.fillText(region.id, x + 5, y + 15);
      }
      ctx.restore();
    }

    function drawPath(ctx) {
      const samples = capture.samples;
      ctx.save();
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.strokeStyle = "#0f8f7f";
      ctx.lineWidth = 3;
      ctx.beginPath();
      samples.forEach((sample, index) => {
        const p = worldToScreen(sample.position.x, sample.position.z);
        if (index === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();
      drawPoint(ctx, samples[0], "#3867b7", "起");
      drawPoint(ctx, samples[samples.length - 1], "#c94d42", "终");
      ctx.restore();
    }

    function drawPoint(ctx, sample, color, label) {
      const p = worldToScreen(sample.position.x, sample.position.z);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "10px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, p.x, p.y);
      ctx.textAlign = "start";
      ctx.textBaseline = "alphabetic";
    }

    function renderChart(canvas, series, unit, color) {
      const size = resizeCanvas(canvas);
      const ctx = canvas.getContext("2d");
      const pad = { left: 46, right: 14, top: 16, bottom: 30 };
      const xs = series.map((point) => point.x);
      const ys = series.map((point) => point.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      let minY = Math.min(...ys);
      let maxY = Math.max(...ys);
      if (minY === maxY) {
        minY -= 1;
        maxY += 1;
      }
      const plotW = size.width - pad.left - pad.right;
      const plotH = size.height - pad.top - pad.bottom;
      const px = (x) => pad.left + ((x - minX) / Math.max(0.001, maxX - minX)) * plotW;
      const py = (y) => pad.top + (1 - (y - minY) / (maxY - minY)) * plotH;

      ctx.clearRect(0, 0, size.width, size.height);
      ctx.strokeStyle = "#dfe5dc";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#687174";
      ctx.font = "11px Segoe UI, sans-serif";
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + (plotH / 4) * i;
        const value = maxY - ((maxY - minY) / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(size.width - pad.right, y);
        ctx.stroke();
        ctx.fillText(formatNumber(value, 1), 6, y + 4);
      }
      ctx.fillText(`0-${formatNumber(maxX, 1)} s`, pad.left, size.height - 10);
      ctx.fillText(unit, size.width - pad.right - 28, 14);

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      series.forEach((point, index) => {
        const x = px(point.x);
        const y = py(point.y);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function renderRegions() {
      const regions = capture.exitRegions || [];
      if (regions.length === 0) {
        regionsEl.textContent = "没有记录出口区域。";
        return;
      }
      regionsEl.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Min</th><th>Max</th></tr></thead>
          <tbody>
            ${regions.map((region) => `
              <tr>
                <td>${escapeHtml(region.id)}</td>
                <td>${region.min.x}, ${region.min.y}, ${region.min.z}</td>
                <td>${region.max.x}, ${region.max.y}, ${region.max.z}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        loadCapture(JSON.parse(text), file.name);
      } catch (error) {
        statusEl.textContent = `读取失败：${error.message}`;
      }
    });

    fitButton.addEventListener("click", fitView);

    mapCanvas.addEventListener("pointerdown", (event) => {
      dragging = true;
      lastPointer = { x: event.clientX, y: event.clientY };
      mapCanvas.setPointerCapture(event.pointerId);
    });

    mapCanvas.addEventListener("pointermove", (event) => {
      if (!dragging || !lastPointer) return;
      view.offsetX += event.clientX - lastPointer.x;
      view.offsetY += event.clientY - lastPointer.y;
      lastPointer = { x: event.clientX, y: event.clientY };
      renderMap();
    });

    mapCanvas.addEventListener("pointerup", () => {
      dragging = false;
      lastPointer = null;
    });

    mapCanvas.addEventListener("wheel", (event) => {
      if (!capture) return;
      event.preventDefault();
      const rect = mapCanvas.getBoundingClientRect();
      const mx = event.clientX - rect.left;
      const my = event.clientY - rect.top;
      const before = screenToWorld(mx, my);
      const factor = event.deltaY < 0 ? 1.12 : 0.89;
      view.scale = Math.min(120, Math.max(1, view.scale * factor));
      const after = worldToScreen(before.x, before.z);
      view.offsetX += mx - after.x;
      view.offsetY += my - after.y;
      renderMap();
    }, { passive: false });

    window.addEventListener("resize", () => {
      if (!capture) return;
      renderAll();
    });

    async function tryLoadFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) return;
      try {
        const response = await fetch(file);
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        loadCapture(await response.json(), file);
      } catch (error) {
        statusEl.textContent = `自动加载失败：${error.message}。请用文件选择器手动打开 JSON。`;
      }
    }

    tryLoadFromQuery();
  </script>
</body>
</html>
